name: Deploy to GitHub Pages

# Runs on every push to main, and can also be triggered manually from the
# Actions tab. The job builds the Vite app and publishes the dist/ folder
# to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimum permissions needed by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one deployment runs at a time; skip queued duplicates.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
